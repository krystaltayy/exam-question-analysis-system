<!DOCTYPE html>
<html>
<head>
    <title>Bloom Analyzer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Rule-Based Web Examination Question Analysis System Using Bloom’s Taxonomy</h1>
<p class="subtitle">Enter your question to analyze</p>

<div class="container">
    <textarea id="question" placeholder="What do you want to analyze?"></textarea>

    <button onclick="showResult()">Analyze question</button>

    <p id="result"></p>
</div>

<script>
function showResult() {
    document.getElementById("result").innerText = "Bloom Level: Analyze";
}
</script>

</body>
</html>
